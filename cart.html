<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — LUMIÈRE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root{--cream:#f5f0e8;--ink:#1a1410;--gold:#c9a84c;--rust:#b85c38;--sage:#7a8c6e;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Cormorant Garamond',serif;background:var(--cream);color:var(--ink);}
    nav{position:fixed;top:0;width:100%;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.4rem 3rem;background:rgba(245,240,232,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,168,76,0.2);}
    .nav-logo{font-family:'Playfair Display',serif;font-size:1.5rem;letter-spacing:0.18em;color:var(--ink);text-decoration:none;}
    .nav-logo span{color:var(--gold);}
    .nav-links{display:flex;gap:2.2rem;list-style:none;}
    .nav-links a{font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink);text-decoration:none;transition:color 0.25s;}
    .nav-links a:hover{color:var(--gold);}
    .nav-cart{display:flex;align-items:center;gap:0.5rem;font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;background:var(--ink);color:var(--cream);padding:0.55rem 1.2rem;text-decoration:none;transition:background 0.25s;}
    .nav-cart:hover{background:var(--gold);}
    .cart-count{background:var(--rust);color:#fff;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:0.65rem;}

    .page-header{padding:7rem 4rem 2rem;}
    .page-label{font-family:'DM Mono',monospace;font-size:0.72rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:0.6rem;}
    .page-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3.5rem);}

    .cart-layout{
      display:grid;grid-template-columns:1fr 380px;
      gap:3rem;padding:2rem 4rem 5rem;
      align-items:start;
    }

    /* CART ITEMS */
    .cart-empty{
      grid-column:1/-1;text-align:center;padding:6rem 2rem;
    }
    .cart-empty h2{font-family:'Playfair Display',serif;font-size:2rem;font-style:italic;margin-bottom:1rem;}
    .cart-empty p{font-size:1.05rem;color:#8a7a6a;margin-bottom:2rem;}
    .btn-browse{display:inline-block;background:var(--ink);color:var(--cream);padding:1rem 2.5rem;font-family:'DM Mono',monospace;font-size:0.8rem;letter-spacing:0.14em;text-transform:uppercase;text-decoration:none;transition:all 0.3s;border:2px solid var(--ink);}
    .btn-browse:hover{background:transparent;color:var(--ink);}

    .cart-items-header{
      display:grid;grid-template-columns:1fr auto auto;gap:2rem;
      border-bottom:1px solid rgba(201,168,76,0.3);
      padding-bottom:0.8rem;margin-bottom:1rem;
    }
    .cart-items-header span{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;color:#8a7a6a;}

    .cart-item{
      display:grid;grid-template-columns:100px 1fr auto;
      gap:1.5rem;align-items:start;
      padding:1.5rem 0;
      border-bottom:1px solid rgba(201,168,76,0.15);
      animation:slideIn 0.3s ease forwards;
    }
    @keyframes slideIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
    .cart-item img{width:100px;height:130px;object-fit:cover;background:#e0d9cd;}
    .cart-item-info{display:flex;flex-direction:column;gap:0.4rem;}
    .item-artist{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--sage);}
    .item-title{font-family:'Playfair Display',serif;font-size:1.3rem;font-style:italic;}
    .item-meta{font-size:0.88rem;color:#8a7a6a;}
    .item-remove{background:none;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:#aaa;text-decoration:underline;margin-top:0.8rem;transition:color 0.2s;}
    .item-remove:hover{color:var(--rust);}
    .item-price{font-family:'Playfair Display',serif;font-size:1.3rem;color:var(--gold);white-space:nowrap;}

    /* ORDER SUMMARY */
    .order-summary{
      background:var(--ink);color:var(--cream);
      padding:2rem;position:sticky;top:7rem;
    }
    .summary-title{font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:1.5rem;border-bottom:1px solid rgba(201,168,76,0.3);padding-bottom:1rem;}
    .summary-row{display:flex;justify-content:space-between;margin-bottom:0.8rem;font-size:0.95rem;}
    .summary-row.label{color:#8a7a6a;font-size:0.9rem;}
    .summary-divider{border:none;border-top:1px solid rgba(201,168,76,0.2);margin:1rem 0;}
    .summary-total{font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--gold);}
    .summary-note{font-size:0.8rem;color:#6a5a4a;margin-top:0.5rem;line-height:1.5;}
    .btn-checkout{
      display:block;width:100%;margin-top:1.5rem;
      background:var(--gold);color:var(--ink);
      padding:1.1rem;text-align:center;
      font-family:'DM Mono',monospace;font-size:0.8rem;
      letter-spacing:0.14em;text-transform:uppercase;
      text-decoration:none;border:2px solid var(--gold);
      transition:all 0.3s;cursor:pointer;border:none;
    }
    .btn-checkout:hover{background:var(--cream);}
    .btn-continue{
      display:block;width:100%;margin-top:0.8rem;
      background:transparent;color:var(--cream);
      padding:0.9rem;text-align:center;
      font-family:'DM Mono',monospace;font-size:0.78rem;
      letter-spacing:0.12em;text-transform:uppercase;
      text-decoration:none;border:1.5px solid rgba(245,240,232,0.3);
      transition:all 0.3s;
    }
    .btn-continue:hover{border-color:var(--cream);}

    /* PROMO */
    .promo-row{display:flex;gap:0;margin-top:1.5rem;}
    .promo-input{flex:1;padding:0.7rem 0.8rem;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:0.9rem;outline:none;}
    .promo-input::placeholder{color:rgba(245,240,232,0.4);}
    .promo-btn{padding:0.7rem 1rem;background:rgba(201,168,76,0.25);border:1px solid var(--gold);color:var(--gold);font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;cursor:pointer;transition:background 0.2s;}
    .promo-btn:hover{background:var(--gold);color:var(--ink);}

    /* TRUST BADGES */
    .trust-badges{display:flex;gap:1.5rem;padding:2rem 4rem;border-top:1px solid rgba(201,168,76,0.2);}
    .badge{display:flex;align-items:center;gap:0.6rem;}
    .badge-icon{font-size:1.3rem;}
    .badge-text{font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:#8a7a6a;}

    footer{background:var(--ink);color:#5a5040;text-align:center;padding:2rem;font-family:'DM Mono',monospace;font-size:0.68rem;letter-spacing:0.1em;}

    @media(max-width:900px){.cart-layout{grid-template-columns:1fr;}.order-summary{position:static;}.trust-badges{flex-wrap:wrap;padding:2rem 1.5rem;}.cart-layout{padding:2rem 1.5rem;}}
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">LUMI<span>È</span>RE</a>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="gallery.html">Gallery</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
  <a href="cart.html" class="nav-cart">◻ Cart <span class="cart-count" id="nav-count">0</span></a>
</nav>

<div class="page-header">
  <p class="page-label">Your Selection</p>
  <h1 class="page-title">Your Cart</h1>
</div>

<div class="cart-layout" id="cart-layout">
  <!-- rendered by JS -->
</div>

<div class="trust-badges">
  <div class="badge"><span class="badge-icon">🔒</span><span class="badge-text">Secure Checkout</span></div>
  <div class="badge"><span class="badge-icon">🎨</span><span class="badge-text">Certificate of Authenticity</span></div>
  <div class="badge"><span class="badge-icon">📦</span><span class="badge-text">Insured Shipping</span></div>
  <div class="badge"><span class="badge-icon">↩</span><span class="badge-text">14-Day Returns</span></div>
</div>

<footer>© 2025 LUMIÈRE Fine Art Gallery</footer>

<script>
function loadCart() {
  return JSON.parse(localStorage.getItem('lumiere_cart') || '[]');
}
function saveCart(cart) {
  localStorage.setItem('lumiere_cart', JSON.stringify(cart));
  document.getElementById('nav-count').textContent = cart.length;
}

function removeItem(id) {
  let cart = loadCart();
  cart = cart.filter(c => c.id !== id);
  saveCart(cart);
  render();
}

function render() {
  const cart = loadCart();
  const layout = document.getElementById('cart-layout');

  if (cart.length === 0) {
    layout.innerHTML = `
      <div class="cart-empty">
        <h2>Your cart is empty</h2>
        <p>Discover exceptional artworks from our curated collection.</p>
        <a href="gallery.html" class="btn-browse">Browse the Gallery</a>
      </div>`;
    return;
  }

  const subtotal = cart.reduce((sum, a) => sum + a.price, 0);
  const shipping = 3500;
  const total = subtotal + shipping;

  layout.innerHTML = `
    <div class="cart-items-col">
      <div class="cart-items-header">
        <span>Artwork</span>
        <span></span>
        <span>Price</span>
      </div>
      ${cart.map(a => `
        <div class="cart-item" id="item-${a.id}">
          <a href="product.html?id=${a.id}">
            <img src="${a.img}" alt="${a.title}"/>
          </a>
          <div class="cart-item-info">
            <p class="item-artist">${a.artist}</p>
            <h3 class="item-title">${a.title}</h3>
            <p class="item-meta">${a.medium} · ${a.size}</p>
            <button class="item-remove" onclick="removeItem(${a.id})">Remove</button>
          </div>
          <div class="item-price">₹${a.price.toLocaleString('en-IN')}</div>
        </div>
      `).join('')}
    </div>

    <div class="order-summary">
      <h2 class="summary-title">Order Summary</h2>
      <div class="summary-row label"><span>Subtotal (${cart.length} item${cart.length>1?'s':''})</span><span>₹${subtotal.toLocaleString('en-IN')}</span></div>
      <div class="summary-row label"><span>Shipping & Insurance</span><span>₹${shipping.toLocaleString('en-IN')}</span></div>
      <div class="summary-row label"><span>Tax (GST 18%)</span><span>₹${Math.round(subtotal*0.18).toLocaleString('en-IN')}</span></div>
      <hr class="summary-divider"/>
      <div class="summary-row"><span>Total</span><span class="summary-total">₹${(subtotal + shipping + Math.round(subtotal*0.18)).toLocaleString('en-IN')}</span></div>
      <p class="summary-note">Prices in Indian Rupees. All artworks professionally packed and fully insured during transit.</p>

      <div class="promo-row">
        <input class="promo-input" type="text" placeholder="Promo code"/>
        <button class="promo-btn">Apply</button>
      </div>

      <a href="purchase.html" class="btn-checkout">Proceed to Checkout →</a>
      <a href="gallery.html" class="btn-continue">← Continue Shopping</a>
    </div>
  `;
}

function updateCartCount() {
  const cart = loadCart();
  document.getElementById('nav-count').textContent = cart.length;
}

render();
updateCartCount();
</script>
</body>
</html>
